<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>TraderPro Calculator</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="tps-popup">
    <header class="tps-popup-header">
      <div class="tps-header-main">
        <strong>TraderPro Calculator</strong>
        <div class="tps-header-summary">
          <span id="settingsSummary" class="tps-header-summary-values"></span>
          <span class="tps-header-summary-hint">Наличността и теглото на стратегията се задават в плаващия панел на страницата на TraderPRO.</span>
        </div>
      </div>
      <div class="tps-header-actions">
        <a class="tps-icon-btn" href="../help/help.html" target="_blank" rel="noopener" aria-label="Помощ" title="Помощ">?</a>
        <button id="openOptionsBtn" class="tps-icon-btn" type="button" aria-label="Настройки" title="Настройки">⚙</button>
      </div>
    </header>

    <div id="emptyState" class="tps-empty-state" hidden>
      Отворете страница със сигнали на TraderPRO (login.traderpro.bg), за да видите сигналите тук.
    </div>

    <ul id="signalsList" class="tps-signals-list"></ul>
  </div>
  <script src="../shared/storage.js"></script>
  <script src="../shared/messaging.js"></script>
  <script src="../shared/sizing.js"></script>
  <script src="../shared/format.js"></script>
  <script src="popup.js"></script>
</body>
</html>
